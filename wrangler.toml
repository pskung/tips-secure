# -----------------------------------------------------------------------------
# ⚙️ โครงสร้างพื้นฐานของระบบ (Core Configuration)
# -----------------------------------------------------------------------------
name = "tips-secure"
main = "functions/api/[[route]].ts"
compatibility_date = "2026-06-16"

# -----------------------------------------------------------------------------
# 🎨 การจัดการไฟล์หน้าเว็บถาวร (Workers Static Assets Setup)
# -----------------------------------------------------------------------------
[assets]
directory = "./dist"
binding = "ASSETS"

# -----------------------------------------------------------------------------
# 🗄️ หน่วยความจำสำหรับการแจ้งเตือนและการสลับสกิน (KV Storage Bindings)
# -----------------------------------------------------------------------------
[[kv_namespaces]]
binding = "DONATION_STORE"
id = "" # เมื่อกด One-Click Deploy ระบบ Cloudflare จะสร้าง ID และนำมาผูกให้โดยอัตโนมัติค่ะ