# wrangler.toml
name = "tips-secure"
compatibility_date = "2026-06-20"
pages_build_output_dir = "dist" # [แก้ไข]: ชี้ไปที่ dist เพื่อให้ระบบ Pages ตรวจเจอทั้ง Static Assets และระบบหลังบ้าน _worker.js

compatibility_flags = [ "nodejs_compat" ]

[[kv_namespaces]]
binding = "DONATION_STORE"
id = "local-dev-dummy-id" # รหัสหล่อเลี้ยงเพื่อรันจำลองระบบบนเครื่องตัวเอง